<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Axione Mail Desk</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body { font-family: "Roboto", sans-serif; }
      .mono { font-family: "IBM Plex Mono", monospace; }
      .mail-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
      .mail-scroll::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.45); border-radius: 999px; }
    </style>
  </head>
  <body class="min-h-screen bg-[#f6f8fc] text-slate-900">
    <script id="initial-state" type="application/json">{{ {
      'acceptedDomains': accepted_domains,
      'pollSeconds': poll_seconds,
      'currentUser': current_user,
      'adminUsername': admin_username,
    } | tojson }}</script>

    <main x-data="mailDesk()" x-init="init()" class="min-h-screen">
      {% include "partials/header.html" %}
      {% include "partials/notices.html" %}

      <div class="flex min-h-[calc(100vh-73px)] gap-4 px-2 pb-4 pt-3 lg:px-4">
        {% include "partials/sidebar.html" %}
        {% include "partials/mail_list.html" %}
        {% include "partials/detail_panel.html" %}
      </div>

      {% include "partials/compose_modal.html" %}
      {% include "partials/auth_modal.html" %}
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
