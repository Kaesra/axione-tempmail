<aside class="hidden w-[256px] shrink-0 lg:block">
  <div class="sticky top-[92px] space-y-3">
    <button @click="openCompose()" class="flex h-14 items-center gap-4 rounded-2xl bg-[#c2e7ff] px-6 text-[15px] font-medium text-slate-900 shadow-sm hover:shadow">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
      Olustur
    </button>

    <nav class="space-y-1 text-[15px]">
      <button class="flex w-full items-center justify-between rounded-r-full bg-[#d3e3fd] px-4 py-2.5 font-medium text-slate-900">
        <span class="flex items-center gap-4"><svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 5.75A1.75 1.75 0 0 1 4.75 4h10.5A1.75 1.75 0 0 1 17 5.75v8.5A1.75 1.75 0 0 1 15.25 16H4.75A1.75 1.75 0 0 1 3 14.25v-8.5Z"/></svg> Gelen Kutusu</span>
        <span class="text-sm font-bold" x-text="totalUnread()"></span>
      </button>
      <button class="flex w-full items-center gap-4 rounded-r-full px-4 py-2.5 text-slate-700 hover:bg-slate-200/70"><svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" d="m12 17.5 6.18 3.25-1.18-6.88L22 9l-6.9-1-3.1-6.25L8.9 8 2 9l4.99 4.87-1.17 6.88z"/></svg> Yildizli</button>
      <button class="flex w-full items-center gap-4 rounded-r-full px-4 py-2.5 text-slate-700 hover:bg-slate-200/70"><svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 8v5l3 3"/><circle cx="12" cy="12" r="9"/></svg> Ertelenenler</button>
      <button class="flex w-full items-center gap-4 rounded-r-full px-4 py-2.5 text-slate-700 hover:bg-slate-200/70"><svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 19h16M12 5v10M7 10l5 5 5-5"/></svg> Gelen Kodlar</button>
    </nav>

    <div class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
      <div class="flex items-center justify-between">
        <p class="text-sm font-medium text-slate-700">Inbox'lar</p>
        <button @click="fetchInboxes()" class="text-xs font-medium text-sky-700">Yenile</button>
      </div>
      <div class="mail-scroll mt-3 max-h-[calc(100vh-420px)] space-y-1 overflow-auto pr-1">
        <template x-for="inbox in inboxes" :key="inbox.address">
          <button @click="selectInbox(inbox.address)" :class="activeInbox && activeInbox.address === inbox.address ? 'bg-[#e8f0fe] text-slate-900' : 'hover:bg-slate-100 text-slate-700'" class="w-full rounded-xl px-3 py-2 text-left text-sm">
            <div class="flex items-center justify-between gap-3">
              <div class="min-w-0">
                <p class="truncate font-medium" x-text="inbox.profile_name || inbox.address"></p>
                <p class="truncate text-xs text-slate-500" x-text="inbox.address"></p>
                <p class="mt-1 text-[11px] uppercase tracking-[0.18em] text-slate-400" x-text="inboxBadge(inbox)"></p>
              </div>
              <span class="shrink-0 text-xs font-medium" x-text="inbox.unread_count || inbox.message_count"></span>
            </div>
          </button>
        </template>
      </div>
    </div>
  </div>
</aside>
