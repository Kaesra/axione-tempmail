<header class="sticky top-0 z-30 border-b border-slate-200 bg-[#f6f8fc]/95 backdrop-blur">
  <div class="flex items-center gap-3 px-3 py-3 lg:px-6">
    <button class="grid h-11 w-11 place-items-center rounded-full text-slate-500 hover:bg-slate-200/70">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
    <div class="flex items-center gap-3 pr-2">
      <div class="grid h-11 w-11 place-items-center rounded-2xl bg-white shadow-sm ring-1 ring-slate-200">
        <svg class="h-8 w-8" viewBox="0 0 64 64" fill="none">
          <rect x="8" y="10" width="48" height="44" rx="12" fill="#E8F0FE"/>
          <path d="M17 22h30l-15 12-15-12Z" fill="#EA4335"/>
          <path d="M17 24v19h10V31l5 4 5-4v12h10V24L32 36 17 24Z" fill="#1A73E8"/>
          <circle cx="47" cy="18" r="8" fill="#22C55E"/>
          <path d="m43.7 18.1 2.1 2.1 4.6-4.8" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <p class="text-[28px] leading-none text-slate-700">Gmail</p>
        <p class="mono mt-1 text-[10px] uppercase tracking-[0.28em] text-sky-600">Axione Mail Desk</p>
      </div>
    </div>

    <div class="hidden flex-1 lg:block">
      <div class="flex max-w-3xl items-center gap-3 rounded-full bg-[#eaf1fb] px-5 py-3 text-slate-500 shadow-inner">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m20 20-3.5-3.5"/></svg>
        <input x-model="search" type="text" placeholder="Postalarda arayin" class="w-full border-0 bg-transparent p-0 text-base text-slate-700 placeholder:text-slate-500 focus:ring-0">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 7h16M7 12h10M10 17h4"/></svg>
      </div>
    </div>

    <div class="ml-auto flex items-center gap-2">
      <button x-show="auth.user" @click="composeOpen = true" class="rounded-full bg-[#c2e7ff] px-4 py-2 text-sm font-medium text-slate-800 lg:hidden">Olustur</button>
      <a href="/guide" class="hidden rounded-full border border-slate-200 bg-white px-6 py-3 text-sm font-medium text-slate-700 transition hover:border-sky-200 hover:bg-sky-50 hover:text-sky-700 lg:block">Docs</a>
      <div class="grid h-10 w-10 place-items-center rounded-full bg-[#0b5] text-white" x-text="auth.user ? auth.user.username.slice(0, 1).toUpperCase() : 'A'"></div>
    </div>
  </div>
</header>
