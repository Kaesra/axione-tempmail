<header class="sticky top-0 z-30 border-b border-white/50 bg-white/55 backdrop-blur-xl">
  <div class="flex items-center gap-3 px-3 py-3 lg:px-6">
    <button type="button" class="grid h-11 w-11 place-items-center rounded-2xl border border-white/70 bg-white/70 text-slate-500 shadow-sm transition hover:-translate-y-0.5 hover:bg-white">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
    <div class="flex items-center gap-3 pr-2">
      <div class="grid h-12 w-12 place-items-center rounded-[20px] bg-white shadow-[0_16px_36px_rgba(14,165,233,0.14)] ring-1 ring-sky-100">
        <svg class="h-8 w-8" viewBox="0 0 64 64" fill="none">
          <rect x="8" y="10" width="48" height="44" rx="12" fill="#E8F0FE"/>
          <path d="M17 22h30l-15 12-15-12Z" fill="#EA4335"/>
          <path d="M17 24v19h10V31l5 4 5-4v12h10V24L32 36 17 24Z" fill="#1A73E8"/>
          <circle cx="47" cy="18" r="8" fill="#22C55E"/>
          <path d="m43.7 18.1 2.1 2.1 4.6-4.8" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <p class="text-[28px] font-medium leading-none tracking-tight text-slate-800">Axione</p>
        <div class="mt-1 flex items-center gap-2">
          <p class="mono text-[10px] uppercase tracking-[0.28em] text-sky-600">Mail Desk</p>
          <span class="rounded-full bg-emerald-50 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-[0.18em] text-emerald-700">Live Inbox</span>
        </div>
      </div>
    </div>

    <div class="hidden flex-1 lg:block">
      <div class="flex max-w-3xl items-center gap-3 rounded-[24px] border border-white/70 bg-white/78 px-5 py-3 text-slate-500 shadow-[inset_0_1px_0_rgba(255,255,255,0.8),0_18px_40px_rgba(15,23,42,0.06)]">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m20 20-3.5-3.5"/></svg>
        <input x-model="search" type="text" placeholder="Postalarda arayin" class="w-full border-0 bg-transparent p-0 text-base text-slate-700 placeholder:text-slate-500 focus:ring-0">
        <div class="hidden items-center gap-2 rounded-full bg-slate-100 px-3 py-1.5 text-[11px] font-semibold uppercase tracking-[0.18em] text-slate-500 xl:flex">
          <span>Smart Filter</span>
        </div>
      </div>
    </div>

    <div class="ml-auto flex items-center gap-2">
      <button x-cloak x-show="auth.user" type="button" @click="openCompose()" class="rounded-full bg-[#c2e7ff] px-4 py-2 text-sm font-medium text-slate-800 transition hover:bg-[#b4ddff] lg:hidden">Olustur</button>
      <a href="/guide" class="hidden rounded-full border border-white/70 bg-white/80 px-5 py-3 text-sm font-medium text-slate-700 transition hover:-translate-y-0.5 hover:border-sky-200 hover:bg-sky-50 hover:text-sky-700 lg:block">Docs</a>
      <button x-cloak x-show="auth.user" type="button" @click="openAccount()" class="grid h-11 w-11 place-items-center rounded-2xl bg-[linear-gradient(135deg,#0f766e,#10b981)] text-sm font-bold text-white shadow-[0_16px_34px_rgba(16,185,129,0.32)]" x-text="auth.user ? auth.user.username.slice(0, 1).toUpperCase() : 'A'"></button>
    </div>
  </div>
</header>
