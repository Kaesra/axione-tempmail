<div x-show="adminMonitorOpen && auth.user && auth.user.is_admin" x-transition.opacity class="fixed inset-0 z-40 bg-slate-950/35"></div>
<section x-show="adminMonitorOpen && auth.user && auth.user.is_admin" x-transition class="fixed inset-x-0 top-12 z-50 mx-auto w-[min(1280px,calc(100vw-24px))] overflow-hidden rounded-[32px] bg-white shadow-[0_40px_120px_rgba(15,23,42,0.35)] ring-1 ring-slate-200">
  <div class="flex items-center justify-between border-b border-slate-200 px-6 py-5">
    <div>
      <p class="mono text-xs uppercase tracking-[0.28em] text-amber-600">Admin Mail Monitor</p>
      <h2 class="mt-2 text-2xl font-medium tracking-tight text-slate-900">Tum kullanicilarin inbox ve mesajlari</h2>
    </div>
    <div class="flex items-center gap-2">
      <button @click="loadAdminOverview()" class="rounded-full border border-slate-200 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Yenile</button>
      <button @click="closeAdminMonitor()" class="rounded-full px-3 py-2 text-sm font-medium text-slate-500 hover:bg-slate-100">Kapat</button>
    </div>
  </div>

  <div class="grid gap-6 p-6 xl:grid-cols-[320px_420px_minmax(0,1fr)]">
    <aside class="space-y-4 rounded-[28px] bg-[#f6f8fc] p-4">
      <div class="flex items-center justify-between gap-3">
        <div>
          <p class="mono text-xs uppercase tracking-[0.24em] text-slate-500">All Inboxes</p>
          <p class="mt-2 text-sm text-slate-500"><span x-text="adminInboxes.length"></span> inbox</p>
        </div>
      </div>
      <div class="max-h-[620px] space-y-2 overflow-auto pr-1">
        <template x-for="inbox in adminInboxes" :key="`admin-inbox-${inbox.address}`">
          <div class="rounded-2xl bg-white p-4 ring-1 ring-slate-200">
            <div class="flex items-center justify-between gap-3">
              <div class="min-w-0">
                <p class="truncate text-sm font-medium text-slate-900" x-text="inbox.profile_name || inbox.address"></p>
                <p class="truncate text-xs text-slate-500" x-text="inbox.address"></p>
              </div>
              <span class="rounded-full bg-slate-100 px-2 py-1 text-xs font-medium text-slate-700" x-text="inbox.message_count || 0"></span>
            </div>
            <div class="mt-3 grid gap-1 text-xs text-slate-500">
              <p x-text="`Sahip: ${inbox.owner_username || '-'}`"></p>
              <p x-text="`Kaynak IP: ${inbox.source_ip || '-'}`"></p>
              <p x-text="`Son konu: ${inbox.latest_subject || '-'}`"></p>
            </div>
          </div>
        </template>
      </div>
    </aside>

    <div class="space-y-4 rounded-[28px] bg-[#f8fafc] p-4">
      <div>
        <p class="mono text-xs uppercase tracking-[0.24em] text-slate-500">Recent Messages</p>
        <p class="mt-2 text-sm text-slate-500">Kimden gelmis, kime gelmis ve hangi kullanicida oldugu burada gorunur.</p>
      </div>
      <div class="max-h-[620px] space-y-2 overflow-auto pr-1">
        <template x-for="message in adminMessages" :key="`admin-message-${message.id}`">
          <button @click="loadAdminMessage(message.id)" class="w-full rounded-2xl bg-white p-4 text-left ring-1 ring-slate-200 transition hover:ring-sky-300">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <p class="truncate text-sm font-semibold text-slate-900" x-text="message.subject || 'Konu yok'"></p>
                <p class="mt-1 truncate text-xs text-slate-500" x-text="message.mail_from || message.sender_domain || '-' "></p>
              </div>
              <span class="text-[11px] text-slate-400" x-text="formatDateTime(message.received_at)"></span>
            </div>
            <div class="mt-3 grid gap-1 text-xs text-slate-500">
              <p x-text="`Kullanici: ${message.owner_username || '-'}`"></p>
              <p x-text="`Inbox: ${message.inbox_address || '-'}`"></p>
              <p x-text="`Ozet: ${message.summary || '-'}`"></p>
            </div>
          </button>
        </template>
      </div>
    </div>

    <div class="space-y-4">
      <div class="rounded-[28px] border border-slate-200 bg-white p-5">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="mono text-xs uppercase tracking-[0.24em] text-slate-500">Message Detail</p>
            <h3 class="mt-2 text-2xl font-medium tracking-tight text-slate-900" x-text="adminSelectedMessage ? (adminSelectedMessage.subject || 'Konu yok') : 'Mesaj secilmedi'"></h3>
          </div>
          <button x-show="adminSelectedMessage" @click="deleteAdminMessage(adminSelectedMessage.id)" class="rounded-full bg-rose-600 px-4 py-2 text-sm font-medium text-white hover:bg-rose-700">Sil</button>
        </div>

        <p x-show="adminMonitorError" class="mt-4 rounded-2xl border border-rose-100 bg-rose-50 px-4 py-3 text-sm text-rose-700" x-text="adminMonitorError"></p>

        <template x-if="adminSelectedMessage">
          <div>
            <div class="mt-5 grid gap-3 md:grid-cols-2">
              <div class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-600">
                <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Kime ait</p>
                <p class="mt-2 font-medium text-slate-900" x-text="adminSelectedMessage.owner_username || '-' "></p>
                <p class="mt-1 break-all" x-text="adminSelectedMessage.inbox_address || '-' "></p>
              </div>
              <div class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-600">
                <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Kimden geldi</p>
                <p class="mt-2 font-medium text-slate-900" x-text="adminSelectedMessage.mail_from || '-' "></p>
                <p class="mt-1" x-text="adminSelectedMessage.sender_domain || '-' "></p>
              </div>
            </div>

            <div class="mt-4 flex flex-wrap gap-2">
              <template x-for="code in (adminSelectedMessage.codes || [])" :key="`admin-code-${code}`">
                <button @click="copyText(code)" class="mono rounded-full bg-emerald-100 px-3 py-2 text-xs font-medium text-emerald-700" x-text="code"></button>
              </template>
              <button x-show="adminSelectedMessage.verification_link" @click="openLink(adminSelectedMessage.verification_link)" class="rounded-full bg-sky-600 px-4 py-2 text-sm font-medium text-white">Dogrulama Linki</button>
            </div>

            <div class="mt-5 overflow-hidden rounded-[24px] border border-slate-200 bg-white">
              <template x-if="adminSelectedMessage.html_body">
                <div class="border-b border-slate-200 bg-slate-50 px-4 py-3 text-xs uppercase tracking-[0.2em] text-slate-400">HTML Onizleme</div>
              </template>
              <template x-if="adminSelectedMessage.html_body">
                <iframe class="min-h-[260px] w-full bg-white" sandbox="allow-popups allow-popups-to-escape-sandbox" :srcdoc="adminSelectedMessage.html_body"></iframe>
              </template>
            </div>

            <div class="mt-4 rounded-[24px] bg-slate-50 p-5">
              <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Metin Icerik</p>
              <pre class="mt-3 whitespace-pre-wrap break-words text-sm leading-6 text-slate-700" x-text="adminSelectedMessage.text_body || adminSelectedMessage.html_body || 'Icerik bulunamadi'"></pre>
            </div>

            <details class="mt-4 rounded-[24px] border border-slate-200 bg-white p-5">
              <summary class="cursor-pointer text-sm font-medium text-slate-700">Raw Headers</summary>
              <pre class="mt-4 whitespace-pre-wrap break-words text-xs leading-6 text-slate-500" x-text="adminSelectedMessage.raw_headers || ''"></pre>
            </details>
          </div>
        </template>

        <template x-if="!adminSelectedMessage">
          <div class="mt-5 rounded-[24px] bg-slate-50 p-6 text-sm text-slate-500">Soldaki listeden bir mesaj sec. Icerik, kimden geldigi ve kime dustugu burada acilir.</div>
        </template>
      </div>
    </div>
  </div>
</section>
